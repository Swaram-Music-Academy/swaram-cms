services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: swaram-app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_PROJECT_URL=http://host.docker.internal:54321
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  app_node_modules:
